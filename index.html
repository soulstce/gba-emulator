<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GBA Emulator</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #121212;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #emulator-container {
            width: 100vw;
            height: 100vh;
        }
        #game {
            width: 100%;
            height: 100%;
        }
        #setup-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
            text-align: center;
        }
        .btn-load {
            background: #007bff;
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            box-shadow: 0 4px #0056b3;
            display: inline-block;
        }
        .btn-load:active {
            transform: translateY(2px);
            box-shadow: 0 2px #0056b3;
        }
        #file-input {
            display: none;
        }
    </style>
</head>
<body>
    <div id="setup-screen">
        <h1>GBA Emulator</h1>
        <p>Select a .gba file to start playing</p>
        <label class="btn-load" for="file-input">Load ROM</label>
        <input type="file" id="file-input" accept=".gba">
        <p style="font-size: 12px; color: #888; margin-top: 20px;">Powered by EmulatorJS</p>
    </div>

    <div id="emulator-container" style="display:none">
        <div id="game"></div>
    </div>

    <script>
        const loadEmulator = (romData) => {
            // EmulatorJS Configuration
            window.EJS_player = '#game';
            window.EJS_core = 'gba';
            window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
            window.EJS_startOnLoaded = true;
            window.EJS_gameUrl = romData; // Can be a URL or Uint8Array/Blob
            
            // UI elements
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('emulator-container').style.display = 'block';

            // Load the loader script
            const script = document.createElement('script');
            script.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
            document.body.appendChild(script);
        };

        document.getElementById('file-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const data = new Uint8Array(event.target.result);
                loadEmulator(data);
            };
            reader.readAsArrayBuffer(file);
        });
    </script>
</body>
</html>
