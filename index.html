<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GBA Emulator</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #121212;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #emulator-container {
            width: 100%;
            height: 100%;
            max-width: 800px;
            max-height: 600px;
            position: relative;
        }
        #game {
            width: 100%;
            height: 100%;
        }
        #setup-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .btn-load {
            background: #007bff;
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            box-shadow: 0 4px #0056b3;
        }
        .btn-load:active {
            transform: translateY(2px);
            box-shadow: 0 2px #0056b3;
        }
        #file-input {
            display: none;
        }
    </style>
</head>
<body>
    <div id="setup-screen">
        <h1>GBA Emulator</h1>
        <p>Select a .gba file to start playing</p>
        <label class="btn-load" for="file-input">Load ROM</label>
        <input type="file" id="file-input" accept=".gba">
    </div>

    <div id="emulator-container" style="display:none">
        <div id="game"></div>
    </div>

    <script>
        window.EJS_player = '#game';
        window.EJS_core = 'gba'; // GBA core
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/'; // CDN path for wasm/js files
        window.EJS_startOnLoaded = true;
        
        // Settings for better experience
        window.EJS_onSaveState = (v) => { console.log("Save State", v); };
        window.EJS_onLoadState = (v) => { console.log("Load State", v); };

        const loadEmulator = (romUrl) => {
            window.EJS_gameUrl = romUrl;
            const script = document.createElement('script');
            script.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
            document.body.appendChild(script);
            
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('emulator-container').style.display = 'block';
        };

        document.getElementById('file-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const blob = new Blob([event.target.result]);
                    const url = URL.createObjectURL(blob);
                    loadEmulator(url);
                };
                reader.readAsArrayBuffer(file);
            }
        });
    </script>
</body>
</html>
